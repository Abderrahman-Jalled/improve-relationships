name: Bug Report
description: Report unexpected behavior from the Improve Relationships skill
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
      placeholder: When I asked for a digest, the skill...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Prompt used
      description: The exact prompt or command you used.
      render: text
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: OpenClaw version, OS, relevant contact/signal setup, screenshots.
    validations:
      required: false
